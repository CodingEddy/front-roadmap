<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://kit.fontawesome.com/9402c6b12a.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
    rel="stylesheet" />
  <title>Document</title>
  <style>
    body {
      font-size: 16px;
      margin: 0;
      font-family: "Sansation", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    .container {
      width: 70%;
      max-width: 1200px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .input-container {
      display: flex;
      justify-content: center;
      flex-direction: column;
      margin: 15px;
    }

    input,
    button {
      height: 30px;
      border: 2px solid black;
      border-radius: 10px;
      margin: 10px 0;
    }

    .error-container {
      color: red;
    }

    .error-container input {
      border: 2px solid red;
      color: red;
    }

    .error-txt {
      font-size: 13px;
    }

    .password {
      display: flex;
      border: 2px solid black;
      border-radius: 10px;
      margin: 10px 0;
    }

    .password input {
      width: 100%;
      border: none;
    }

    .password input:focus {
      outline: none;
    }

    .password input,
    .password button {
      margin: 0;
    }

    .password button {
      background-color: white;
      border: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    button {
      background-color: black;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <div>
      <div class="input-container">
        <label for="name">Full Name</label>
        <input type="text" name="name" id="name" placeholder="What should we call you?">
      </div>
      <div class="input-container error-container">
        <label for="email">Full Name</label>
        <input type="email" name="email" id="email" value="john@doe.com">
        <div class="error-txt">
          Email is already taken
        </div>
      </div>
      <div class="input-container">
        <label for="password">Full Name</label>
        <div class="password">
          <input type="password" name="password" id="password" placeholder="********">
          <button>
            <svg stroke="#b0b0b0" width="15" height="15" viewBox="0 0 15 15" fill="none"
              xmlns="http://www.w3.org/2000/svg">
              <path
                d="M7.5 11C4.80285 11 2.52952 9.62184 1.09622 7.50001C2.52952 5.37816 4.80285 4 7.5 4C10.1971 4 12.4705 5.37816 13.9038 7.50001C12.4705 9.62183 10.1971 11 7.5 11ZM7.5 3C4.30786 3 1.65639 4.70638 0.0760002 7.23501C-0.0253338 7.39715 -0.0253334 7.60288 0.0760014 7.76501C1.65639 10.2936 4.30786 12 7.5 12C10.6921 12 13.3436 10.2936 14.924 7.76501C15.0253 7.60288 15.0253 7.39715 14.924 7.23501C13.3436 4.70638 10.6921 3 7.5 3ZM7.5 9.5C8.60457 9.5 9.5 8.60457 9.5 7.5C9.5 6.39543 8.60457 5.5 7.5 5.5C6.39543 5.5 5.5 6.39543 5.5 7.5C5.5 8.60457 6.39543 9.5 7.5 9.5Z"
                fill="#b0b0b0" fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-container">
        <label for="confirmPassword">Full Name</label>
        <div class="password">
          <input type="password" name="confirmPassword" id="confirmPassword" placeholder="********">
          <button>
            <svg stroke="#b0b0b0" width="15" height="15" viewBox="0 0 15 15" fill="none"
              xmlns="http://www.w3.org/2000/svg">
              <path
                d="M7.5 11C4.80285 11 2.52952 9.62184 1.09622 7.50001C2.52952 5.37816 4.80285 4 7.5 4C10.1971 4 12.4705 5.37816 13.9038 7.50001C12.4705 9.62183 10.1971 11 7.5 11ZM7.5 3C4.30786 3 1.65639 4.70638 0.0760002 7.23501C-0.0253338 7.39715 -0.0253334 7.60288 0.0760014 7.76501C1.65639 10.2936 4.30786 12 7.5 12C10.6921 12 13.3436 10.2936 14.924 7.76501C15.0253 7.60288 15.0253 7.39715 14.924 7.23501C13.3436 4.70638 10.6921 3 7.5 3ZM7.5 9.5C8.60457 9.5 9.5 8.60457 9.5 7.5C9.5 6.39543 8.60457 5.5 7.5 5.5C6.39543 5.5 5.5 6.39543 5.5 7.5C5.5 8.60457 6.39543 9.5 7.5 9.5Z"
                fill="#b0b0b0" fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-container">
        <button>Update Profile</button>
      </div>
    </div>
    <div>
      Segunda inf
    </div>
  </div>
</body>

</html>
